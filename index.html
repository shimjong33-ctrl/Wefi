<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WeFi DeoBank | 신규회원 안내</title>
<meta property="og:title" content="WeFi DeoBank 신규회원 안내">
<meta property="og:description" content="세계 최초 디오뱅크 WeFi · Made by Mark Shim (발란스)">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WeFi DeoBank">
<meta name="application-name" content="WeFi DeoBank">
<meta name="theme-color" content="#080e0a">
<meta name="msapplication-TileColor" content="#080e0a">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --green: #00ff88;
    --green2: #00cc6a;
    --blue: #00ccff;
    --black: #080e0a;
    --dark: #0d1a10;
    --card: #111d14;
    --border: rgba(0,255,136,0.15);
    --text: #e8f5ec;
    --muted: #7a9980;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { font-size: 14px; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--black);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,255,136,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(0,204,255,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 40px; }

  .hero { padding: 48px 24px 36px; text-align: center; position: relative; }
  .hero-badge {
    display: inline-block;
    background: rgba(0,255,136,0.1);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.75em;
    color: var(--green);
    letter-spacing: 0.1em;
    margin-bottom: 20px;
    font-family: 'Space Mono', monospace;
  }
  .hero-logo {
    font-size: 2.8em;
    font-weight: 900;
    background: linear-gradient(135deg, var(--green), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .hero-sub { font-size: 0.85em; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
  .hero-desc {
    background: rgba(0,255,136,0.05);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 0.82em;
    line-height: 1.7;
    color: #b8d4bc;
  }

  .nav { display: flex; gap: 8px; padding: 0 16px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    flex-shrink: 0;
    padding: 10px 18px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 0.82em;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
  }
  .nav-btn.active { background: rgba(0,255,136,0.15); border-color: var(--green); color: var(--green); }

  .section { display: none !important; padding: 0 16px; }
  .section.show { display: block !important; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 16px; }
  .card-title { font-size: 1em; font-weight: 700; color: var(--green); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

  .fact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .fact-item { background: rgba(0,255,136,0.05); border: 1px solid rgba(0,255,136,0.1); border-radius: 12px; padding: 14px 12px; text-align: center; }
  .fact-item .fi-label { font-size: 0.72em; color: var(--muted); margin-bottom: 6px; }
  .fact-item .fi-value { font-size: 1.0em; font-weight: 700; color: var(--green); line-height: 1.3; }

  .cta-btn {
    display: block; width: 100%; padding: 16px;
    background: linear-gradient(90deg, var(--green), var(--blue));
    border: none; border-radius: 14px;
    font-size: 1.05em; font-weight: 700; color: #000;
    text-align: center; text-decoration: none; cursor: pointer;
    margin-bottom: 10px; font-family: 'Noto Sans KR', sans-serif;
  }

  .footer { text-align: center; padding: 24px 16px 12px; font-size: 0.75em; color: var(--muted); border-top: 1px solid rgba(255,255,255,0.06); margin-top: 8px; }
  .highlight { color: var(--green); font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-badge">🌐 WORLD'S FIRST DEOBANK</div>
    <div class="hero-logo">WeFi DeoBank</div>
    <div class="hero-sub">Beyond Banking · 블록체인이 만든 새로운 은행</div>
    <div class="hero-desc">
      테더(USDT) 창업자 <span class="highlight">리브 콜린스</span>가 설계한<br>
      세계 최초 탈중앙화 온체인 뱅킹 플랫폼.
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showSection('intro', this)">🏦 소개</button>
    <button class="nav-btn" onclick="showSection('ito', this)">⛏️ ITO참여</button>
  </div>

  <div class="section show" id="sec-intro">
    <div class="card">
      <div class="card-title">📡 WFI 실시간 시세</div>
      <div class="fact-grid">
        <div class="fact-item" style="grid-column: 1/-1;">
          <div class="fi-label">현재 가격 (USD)</div>
          <div id="wfi-price" style="font-size:2.5em; font-weight:900; color:var(--blue)">$2.11</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">✅ 핵심 서비스</div>
      <div style="font-size:0.9em; line-height:1.8;">
        • 세계 최초 온체인 계좌 제공<br>
        • WeFi Visa 카드 글로벌 결제<br>
        • 하드웨어 없는 ZK 기반 채굴
      </div>
    </div>
  </div>

  <div class="section" id="sec-ito">
    <div class="card">
      <div class="card-title">🔗 내 레퍼럴 코드 설정</div>
      <input id="refInput" type="text" placeholder="예: f9vipn2iog" style="width:100%; padding:10px; margin-bottom:10px; background:#222; border:1px solid #444; color:#fff; border-radius:8px;">
      <button onclick="applyRef()" class="cta-btn">레퍼럴 적용하기</button>
    </div>
  </div>

  <div class="footer">
    ⚠️ 본 자료는 참고용이며 투자 권유가 아닙니다.<br>
    Made by <strong>Mark Shim (발란스)</strong>
  </div>
</div>

<script>
  function showSection(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('show'));
    document.getElementById('sec-' + id).classList.add('show');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function applyRef() {
    const code = document.getElementById('refInput').value.trim();
    if(code) { alert('대표님의 코드 [' + code + '] 적용 완료!'); }
  }

  async function loadPrice() {
    try {
      const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=wefi&vs_currencies=usd');
      const data = await res.json();
      if(data.wefi) document.getElementById('wfi-price').textContent = '$' + data.wefi.usd.toFixed(3);
    } catch(e) {}
  }
  loadPrice();
  setInterval(loadPrice, 60000);
</script>
</body>
</html>
