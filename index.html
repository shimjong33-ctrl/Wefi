<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WeFi DeoBank | 신규회원 안내</title>
<meta property="og:title" content="WeFi DeoBank 신규회원 안내">
<meta property="og:description" content="세계 최초 디오뱅크 WeFi · Made by Mark Shim (발란스)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');
  :root { --green: #00ff88; --blue: #00ccff; --black: #080e0a; --card: #111d14; --border: rgba(0,255,136,0.15); --text: #e8f5ec; --muted: #7a9980; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--black); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 0 0 40px; }
  .hero { padding: 48px 24px; text-align: center; }
  .hero-logo { font-size: 2.5em; font-weight: 900; background: linear-gradient(135deg, var(--green), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .nav { display: flex; gap: 8px; padding: 0 16px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none; }
  .nav-btn { flex-shrink: 0; padding: 10px 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--muted); font-size: 0.85em; cursor: pointer; }
  .nav-btn.active { background: rgba(0,255,136,0.15); border-color: var(--green); color: var(--green); }
  .section { display: none; padding: 0 16px; }
  .section.show { display: block; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 16px; }
  .cta-btn { display: block; width: 100%; padding: 16px; background: linear-gradient(90deg, var(--green), var(--blue)); border: none; border-radius: 14px; font-weight: 700; color: #000; text-align: center; text-decoration: none; margin-top: 10px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-logo">WeFi DeoBank</div>
    <div style="color:var(--muted); margin-top:10px;">Beyond Banking · 블록체인이 만든 새로운 은행</div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showSection('intro', this)">🏦 소개</button>
    <button class="nav-btn" onclick="showSection('team', this)">👥 팀</button>
    <button class="nav-btn" onclick="showSection('ecosystem', this)">🔗 생태계</button>
    <button class="nav-btn" onclick="showSection('ito', this)">⛏️ ITO참여</button>
    <button class="nav-btn" onclick="showSection('calc', this)">📊 계산기</button>
  </div>

  <div id="sec-intro" class="section show">
    <div class="card">
      <div style="color:var(--green); font-weight:700;">📡 WFI 실시간 시세</div>
      <div id="price-display" style="font-size:2.5em; font-weight:900; color:var(--blue); margin:10px 0;">$2.11</div>
    </div>
  </div>

  <div id="sec-team" class="section">
    <div class="card">
      <div style="color:var(--green); font-weight:700;">👑 핵심 팀</div>
      <p style="margin-top:10px;">리브 콜린스 (USDT 창업자) 외 글로벌 전문가진</p>
    </div>
  </div>

  <div id="sec-ecosystem" class="section">
    <div class="card">
      <div style="color:var(--green); font-weight:700;">🔗 3각 생태계</div>
      <p style="margin-top:10px;">ReserveOne(나스닥) + STBL + WeFi</p>
    </div>
  </div>

  <div id="sec-ito" class="section">
    <div class="card">
      <div style="color:var(--green); font-weight:700;">🔗 레퍼럴 설정</div>
      <input id="refInput" type="text" placeholder="코드 입력" style="width:100%; padding:10px; margin-top:10px; background:#000; color:#fff; border:1px solid var(--border); border-radius:8px;">
      <button onclick="applyRef()" class="cta-btn">적용하기</button>
    </div>
    <a id="join-link" href="https://app.wefi.co/register?ref=f9vipn2iog" target="_blank" class="cta-btn">🚀 지금 가입하기</a>
  </div>

  <div id="sec-calc" class="section">
    <div class="card">
      <div style="color:var(--green); font-weight:700;">📊 채굴 수익 계산기</div>
      <p style="margin-top:10px;">투자금액별 예상 채굴량을 확인하세요.</p>
    </div>
  </div>

  <div class="footer" style="text-align:center; padding:20px; font-size:0.8em; color:var(--muted);">
    Made by <strong>Mark Shim (발란스)</strong>
  </div>
</div>

<script>
  function showSection(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('show'));
    document.getElementById('sec-' + id).classList.add('show');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  function applyRef() {
    const code = document.getElementById('refInput').value.trim();
    if(code) {
      document.getElementById('join-link').href = "https://app.wefi.co/register?ref=" + code;
      alert('대표님의 코드 [' + code + '] 적용 완료!');
    }
  }
</script>
</body>
</html>
