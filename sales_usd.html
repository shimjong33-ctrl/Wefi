<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>달러 매출 기록장</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Grotesk:wght@500;600;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0f2f5;--card:#fff;
  --green:#1a9950;--green-light:#e8f5ee;
  --blue:#2563eb;--blue-light:#eff6ff;
  --red:#e74c3c;--red-light:#fdecea;
  --text:#1a1a2e;--gray:#8892a4;--border:#e8eaf0;
  --shadow:0 2px 16px rgba(0,0,0,0.08);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);}

/* 헤더 */
.header{background:linear-gradient(135deg,#1a3a6b,#2563eb);padding:20px 20px 28px;position:relative;overflow:hidden;}
.header::after{content:'';position:absolute;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,0.05);top:-70px;right:-50px;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.app-title{font-size:17px;font-weight:700;color:white;letter-spacing:-0.3px;}
.rate-badge{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.15);border-radius:20px;padding:5px 12px;cursor:pointer;}
.rate-badge-label{font-size:10px;color:rgba(255,255,255,0.7);}
.rate-badge-val{font-size:13px;font-weight:700;color:white;font-family:'Space Grotesk',sans-serif;}
.rate-update{font-size:9px;color:rgba(255,255,255,0.5);margin-top:1px;text-align:right;}
.today-usd-label{font-size:11px;color:rgba(255,255,255,0.65);margin-bottom:2px;}
.today-usd{font-family:'Space Grotesk',sans-serif;font-size:38px;font-weight:700;color:white;letter-spacing:-1px;}
.today-krw{font-size:16px;color:rgba(255,255,255,0.7);margin-top:3px;font-family:'Space Grotesk',sans-serif;}
.today-count{font-size:11px;color:rgba(255,255,255,0.55);margin-top:3px;}

/* 탭 */
.tabs{display:flex;background:white;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.tab{flex:1;padding:13px 4px;text-align:center;font-size:12px;font-weight:500;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700;}

/* 컨텐츠 */
.content{display:none;padding:16px;}
.content.active{display:block;}

/* 입력 카드 */
.input-card{background:var(--card);border-radius:16px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px;}
.input-card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;}
.amount-row{display:flex;gap:10px;margin-bottom:12px;align-items:center;}
.currency-toggle{width:38px;height:38px;border-radius:10px;background:var(--green-light);color:var(--green);font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.amount-input-wrap{flex:1;position:relative;}
.amount-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:20px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s;}
.amount-input:focus{border-color:var(--blue);}
.converted-preview{font-size:11px;color:var(--gray);margin-top:6px;padding-left:2px;}
.memo-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;font-family:'Noto Sans KR',sans-serif;margin-bottom:12px;}
.memo-input:focus{border-color:var(--blue);}
.quick-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.quick-btn{padding:6px 12px;border-radius:20px;background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:600;cursor:pointer;border:none;}
.add-btn{width:100%;padding:14px;background:var(--blue);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.add-btn:active{opacity:0.85;}

/* 마감 배너 */
.close-banner{background:linear-gradient(135deg,#1a9950,#0d7a3a);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.cb-icon{font-size:22px;}
.cb-text{flex:1;}
.cb-title{font-size:13px;font-weight:700;color:white;}
.cb-sub{font-size:11px;color:rgba(255,255,255,0.75);margin-top:2px;}
.cb-btn{background:white;color:var(--green);border:none;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}

/* 자동마감 알림 배너 */
.auto-close-notice{background:linear-gradient(135deg,#f39c12,#e67e22);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.auto-close-notice .acn-icon{font-size:18px;}
.auto-close-notice .acn-text{font-size:12px;color:white;font-weight:500;}

/* 거래 리스트 */
.txn-list{display:flex;flex-direction:column;gap:8px;}
.txn-item{background:var(--card);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 6px rgba(0,0,0,0.05);}
.txn-icon{font-size:20px;}
.txn-info{flex:1;}
.txn-memo{font-size:13px;font-weight:600;color:var(--text);}
.txn-time{font-size:11px;color:var(--gray);margin-top:2px;}
.txn-amounts{text-align:right;}
.txn-usd{font-size:15px;font-weight:700;color:var(--green);font-family:'Space Grotesk',sans-serif;}
.txn-krw{font-size:11px;color:var(--gray);margin-top:1px;}
.txn-del{width:26px;height:26px;border-radius:50%;background:#fdecea;color:#e74c3c;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}

/* 마감 상태 */
.closed-badge{display:inline-flex;align-items:center;gap:4px;background:var(--green-light);color:var(--green);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;margin-bottom:8px;}
.empty-state{text-align:center;padding:40px 20px;color:var(--gray);}
.empty-icon{font-size:36px;margin-bottom:8px;}

/* 일별 마감 탭 */
.daily-item{background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
.daily-date{font-size:12px;color:var(--gray);margin-bottom:6px;}
.daily-usd{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--blue);}
.daily-krw{font-size:14px;color:var(--green);font-weight:600;margin-top:2px;}
.daily-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;margin-bottom:8px;}
.daily-tag{background:var(--blue-light);color:var(--blue);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;}
.daily-tag.green{background:var(--green-light);color:var(--green);}
.daily-tag.gray{background:#f0f2f5;color:var(--gray);}
.daily-tag.orange{background:#fff3e0;color:#e67e22;}
.daily-txns{font-size:11px;color:var(--gray);border-top:1px solid var(--border);padding-top:8px;margin-top:4px;}

/* 월별 리포트 */
.month-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px;}
.month-nav-btn{width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--border);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.month-label{font-size:16px;font-weight:700;color:var(--text);}
.month-summary{background:linear-gradient(135deg,#1a3a6b,#2563eb);border-radius:16px;padding:20px;margin-bottom:14px;color:white;}
.ms-label{font-size:12px;opacity:0.7;margin-bottom:4px;}
.ms-amount{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;}
.ms-stats{display:flex;gap:0;margin-top:14px;border-top:1px solid rgba(255,255,255,0.2);padding-top:12px;}
.ms-stats>div{flex:1;text-align:center;}
.ms-stat-label{font-size:10px;opacity:0.65;}
.ms-stat-val{font-size:16px;font-weight:700;margin-top:2px;}
.report-card{background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--shadow);}
.day-chart{display:flex;flex-direction:column;gap:6px;margin-top:10px;}
.day-row{display:flex;align-items:center;gap:8px;}
.day-label{width:28px;font-size:11px;color:var(--gray);text-align:right;flex-shrink:0;}
.day-bar-wrap{flex:1;background:#f0f2f5;border-radius:20px;height:22px;overflow:hidden;}
.day-bar{height:100%;background:linear-gradient(90deg,var(--blue),#60a5fa);border-radius:20px;display:flex;align-items:center;padding:0 8px;transition:width 0.4s;}
.day-bar-val{font-size:10px;color:white;font-weight:600;white-space:nowrap;}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:flex-end;justify-content:center;z-index:999;}
.modal-overlay.show{display:flex;}
.modal{background:white;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center;}
.modal-presets{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.mp-btn{padding:8px 14px;border-radius:20px;background:var(--blue-light);color:var(--blue);font-size:13px;font-weight:600;cursor:pointer;border:none;}
.modal-input-wrap{display:flex;align-items:center;gap:8px;border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:14px;}
.modal-prefix{font-size:18px;font-weight:700;color:var(--gray);}
.modal-input{flex:1;border:none;outline:none;font-size:20px;font-weight:700;font-family:'Space Grotesk',sans-serif;}
.modal-btn{width:100%;padding:14px;background:var(--blue);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* 토스트 */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a2e;color:white;padding:11px 22px;border-radius:50px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;opacity:0;transition:all 0.3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- 환율 모달 -->
<div class="modal-overlay" id="rateModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">💱 오늘 환율 입력</div>
    <div class="modal-presets">
      <button class="mp-btn" onclick="setRatePreset(1500)">₩1,500</button>
      <button class="mp-btn" onclick="setRatePreset(1520)">₩1,520</button>
      <button class="mp-btn" onclick="setRatePreset(1535)">₩1,535</button>
      <button class="mp-btn" onclick="setRatePreset(1550)">₩1,550</button>
      <button class="mp-btn" onclick="setRatePreset(1570)">₩1,570</button>
      <button class="mp-btn" onclick="setRatePreset(1600)">₩1,600</button>
    </div>
    <div class="modal-input-wrap">
      <span class="modal-prefix">₩</span>
      <input type="number" class="modal-input" id="rateInput" placeholder="1535" inputmode="numeric">
    </div>
    <button class="modal-btn" onclick="saveRate()">환율 저장</button>
  </div>
</div>

<!-- 헤더 -->
<div class="header">
  <div class="header-top">
    <div class="app-title">💵 달러 매출 기록장</div>
    <div>
      <div class="rate-badge" onclick="openModal()">
        <div class="rate-badge-label">USD/KRW</div>
        <div class="rate-badge-val" id="rateBadge">₩1,535</div>
      </div>
      <div class="rate-update" id="rateUpdateTime">탭해서 환율 입력</div>
    </div>
  </div>
  <div class="today-usd-label">오늘 총 매출</div>
  <div class="today-usd" id="todayUSD">$0.00</div>
  <div class="today-krw" id="todayKRW">≈ ₩0</div>
  <div class="today-count" id="todayCount">기록 0건</div>
</div>

<!-- 탭 -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('today')">📝 오늘 입력</div>
  <div class="tab" onclick="switchTab('daily')">📋 일별 마감</div>
  <div class="tab" onclick="switchTab('monthly')">📊 월별 리포트</div>
</div>

<!-- 오늘 입력 탭 -->
<div class="content active" id="tab-today">
  <div id="closeBanner"></div>
  <div class="input-card">
    <div class="input-card-title">💵 달러 매출 입력</div>
    <div class="amount-row">
      <div class="currency-toggle">$</div>
      <div class="amount-input-wrap">
        <input type="number" class="amount-input" id="amountInput" placeholder="0.00" inputmode="decimal" step="0.01" oninput="updatePreview()">
        <div class="converted-preview" id="convertedPreview">≈ ₩0</div>
      </div>
    </div>
    <input type="text" class="memo-input" id="memoInput" placeholder="메모 (예: 홍길동 고객)">
    <div class="quick-btns">
      <button class="quick-btn" onclick="setAmount(30)">$30</button>
      <button class="quick-btn" onclick="setAmount(50)">$50</button>
      <button class="quick-btn" onclick="setAmount(100)">$100</button>
      <button class="quick-btn" onclick="setAmount(150)">$150</button>
      <button class="quick-btn" onclick="setAmount(200)">$200</button>
    </div>
    <button class="add-btn" onclick="addTransaction()">+ 매출 추가</button>
  </div>
  <div class="txn-list" id="txnList"></div>
</div>

<!-- 일별 마감 탭 -->
<div class="content" id="tab-daily">
  <div id="dailyList"></div>
</div>

<!-- 월별 리포트 탭 -->
<div class="content" id="tab-monthly">
  <div class="month-nav">
    <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div id="monthContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 상수 ──
const STORAGE_KEY = 'dollar_sales_v2';
const RATE_KEY = 'dollar_rate_v2';
const DEFAULT_RATE = 1535;

// ── 날짜 유틸 ──
function TODAY() {
  const n = new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}
function dateKey(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDate(k) {
  const [y,m,d] = k.split('-');
  const days = ['일','월','화','수','목','금','토'];
  const dow = new Date(Number(y),Number(m)-1,Number(d)).getDay();
  return `${m}월 ${d}일 (${days[dow]})`;
}

// ── 환율 ──
function getRate() {
  return Number(localStorage.getItem(RATE_KEY)) || DEFAULT_RATE;
}
function setRatePreset(v) { document.getElementById('rateInput').value = v; }
function openModal() {
  document.getElementById('rateInput').value = getRate();
  document.getElementById('rateModal').classList.add('show');
}
function closeModal(e) { if(e.target.id==='rateModal') document.getElementById('rateModal').classList.remove('show'); }
function saveRate() {
  const v = Number(document.getElementById('rateInput').value);
  if(!v || v < 900 || v > 2000) { showToast('유효한 환율을 입력해주세요'); return; }
  localStorage.setItem(RATE_KEY, v);
  document.getElementById('rateBadge').textContent = '₩'+v.toLocaleString();
  document.getElementById('rateUpdateTime').textContent = '방금 업데이트';
  document.getElementById('rateModal').classList.remove('show');
  renderToday();
  showToast('환율 저장됨 ₩'+v.toLocaleString());
}

// ── 데이터 ──
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function getToday() {
  const d = loadData();
  const key = TODAY();
  if(!d[key]) d[key] = { transactions:[], totalUSD:0, closed:false, closedAt:null, rate:getRate(), autoClosedAt:null };
  return d;
}

// ── 포맷 ──
function fmtUSD(v) { return '$'+(Number(v)||0).toFixed(2); }
function fmtKRW(v) { return '₩'+(Math.round(Number(v)||0)).toLocaleString(); }

// ── 자동 마감 ──
// 오늘 날짜보다 이전인 날짜는 모두 자동 마감
function autoClose() {
  const d = loadData();
  const today = TODAY();
  let changed = false;
  Object.keys(d).forEach(k => {
    if(k < today && !d[k].closed) {
      d[k].closed = true;
      d[k].autoClosedAt = new Date().toLocaleString('ko-KR');
      d[k].closedAt = '자동마감';
      changed = true;
    }
  });
  if(changed) saveData(d);
  return changed;
}

// 자정 감지: 앱 로드 시 날짜를 저장해두고, 체크할 때마다 비교
let _lastCheckedDate = TODAY();

function midnightCheck() {
  const now = TODAY();
  if(now !== _lastCheckedDate) {
    // 날짜가 바뀌었다 = 자정이 지났다
    _lastCheckedDate = now;
    autoClose();
    renderAll();
    showToast('🌙 자정이 지나 전날이 자동 마감됐습니다');
  }
}

// ── 입력 ──
function updatePreview() {
  const v = parseFloat(document.getElementById('amountInput').value) || 0;
  document.getElementById('convertedPreview').textContent = '≈ ' + fmtKRW(v * getRate());
}
function setAmount(v) {
  document.getElementById('amountInput').value = v;
  updatePreview();
}

function addTransaction() {
  const amount = parseFloat(document.getElementById('amountInput').value);
  if(!amount || amount <= 0) { showToast('금액을 입력해주세요'); return; }
  const memo = document.getElementById('memoInput').value.trim() || '매출';
  const d = getToday();
  const key = TODAY();
  if(d[key].closed) { showToast('오늘은 이미 마감됐어요'); return; }
  const now = new Date();
  const time = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  d[key].transactions.push({ id: Date.now(), amount, memo, time, rate: getRate() });
  d[key].totalUSD = d[key].transactions.reduce((s,t)=>s+t.amount, 0);
  d[key].rate = getRate();
  saveData(d);
  document.getElementById('amountInput').value = '';
  document.getElementById('memoInput').value = '';
  document.getElementById('convertedPreview').textContent = '≈ ₩0';
  renderToday();
  showToast(`✅ ${fmtUSD(amount)} 추가됐어요`);
}

function deleteTransaction(id) {
  const d = getToday();
  const key = TODAY();
  d[key].transactions = d[key].transactions.filter(t=>t.id!==id);
  d[key].totalUSD = d[key].transactions.reduce((s,t)=>s+t.amount, 0);
  saveData(d);
  renderToday();
  showToast('삭제됐어요');
}

// ── 오늘 마감 ──
function closeToday() {
  const d = getToday();
  const key = TODAY();
  d[key].closed = true;
  d[key].closedAt = new Date().toLocaleString('ko-KR');
  d[key].rate = getRate();
  saveData(d);
  renderToday();
  showToast(`마감! ${fmtUSD(d[key].totalUSD)} ≈ ${fmtKRW(d[key].totalUSD * getRate())}`);
}

// ── 오늘 렌더 ──
function renderToday() {
  autoClose();
  const d = getToday();
  const key = TODAY();
  const day = d[key];
  const txns = day.transactions;
  const totalUSD = day.totalUSD || 0;
  const rate = getRate();

  document.getElementById('todayUSD').textContent = fmtUSD(totalUSD);
  document.getElementById('todayKRW').textContent = '≈ ' + fmtKRW(totalUSD * rate);
  document.getElementById('todayCount').textContent = `기록 ${txns.length}건 · 적용환율 ₩${rate.toLocaleString()}`;
  document.getElementById('rateBadge').textContent = '₩'+rate.toLocaleString();

  const banner = document.getElementById('closeBanner');
  if(day.closed) {
    banner.innerHTML = `<div class="closed-badge">✅ 오늘 마감 완료 · ${day.autoClosedAt ? '자동마감' : day.closedAt}</div>`;
  } else if(txns.length > 0) {
    banner.innerHTML = `
      <div class="close-banner">
        <div class="cb-icon">🔔</div>
        <div class="cb-text">
          <div class="cb-title">오늘 하루 마감하기</div>
          <div class="cb-sub">${fmtUSD(totalUSD)} · ≈ ${fmtKRW(totalUSD*rate)} · ${txns.length}건</div>
        </div>
        <button class="cb-btn" onclick="closeToday()">마감</button>
      </div>`;
  } else {
    banner.innerHTML = '';
  }

  const list = document.getElementById('txnList');
  if(txns.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div>아직 입력된 매출이 없어요</div>';
    return;
  }
  list.innerHTML = [...txns].reverse().map(t => `
    <div class="txn-item">
      <div class="txn-icon">💵</div>
      <div class="txn-info">
        <div class="txn-memo">${t.memo}</div>
        <div class="txn-time">${t.time} · ₩${(t.rate||rate).toLocaleString()}</div>
      </div>
      <div class="txn-amounts">
        <div class="txn-usd">${fmtUSD(t.amount)}</div>
        <div class="txn-krw">≈ ${fmtKRW(t.amount*(t.rate||rate))}</div>
      </div>
      ${day.closed ? '' : `<button class="txn-del" onclick="deleteTransaction(${t.id})">✕</button>`}
    </div>`).join('');
}

// ── 일별 마감 렌더 ──
function renderDaily() {
  autoClose();
  const d = loadData();
  const keys = Object.keys(d).sort((a,b)=>b.localeCompare(a));
  const list = document.getElementById('dailyList');
  if(keys.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>마감 기록이 없어요</div>';
    return;
  }
  list.innerHTML = keys.map(k => {
    const day = d[k];
    const rate = day.rate || DEFAULT_RATE;
    const totalUSD = day.totalUSD || 0;
    const totalKRW = totalUSD * rate;
    const isAuto = day.autoClosedAt || day.closedAt === '자동마감';
    const closedTime = isAuto
      ? (day.autoClosedAt || '자동마감')
      : (day.closedAt || '');
    return `
      <div class="daily-item">
        <div class="daily-date">${fmtDate(k)} · 적용환율 ₩${rate.toLocaleString()}</div>
        <div class="daily-usd">${fmtUSD(totalUSD)}</div>
        <div class="daily-krw">≈ ${fmtKRW(totalKRW)}</div>
        <div class="daily-tags">
          <span class="daily-tag">${day.transactions.length}건</span>
          <span class="daily-tag green">${fmtKRW(totalKRW)}</span>
          ${day.closed
            ? `<span class="daily-tag ${isAuto ? 'orange' : 'gray'}">마감 ${isAuto ? '🤖 자동' : '✋ 수동'} ${closedTime ? '· '+closedTime : ''}</span>`
            : '<span class="daily-tag" style="background:#fdecea;color:#e74c3c;">미마감</span>'}
        </div>
        <div class="daily-txns">${day.transactions.map(t=>'매출 '+fmtUSD(t.amount)).join(' · ')}</div>
      </div>`;
  }).join('');
}

// ── 월별 리포트 ──
let currentMonth = new Date();
function changeMonth(delta) {
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth()+delta, 1);
  renderMonthly();
}
function renderMonthly() {
  const y = currentMonth.getFullYear(), m = currentMonth.getMonth()+1;
  const prefix = y+'-'+String(m).padStart(2,'0');
  const label = `${y}년 ${m}월`;
  document.getElementById('monthLabel').textContent = label;
  const d = loadData();
  const monthKeys = Object.keys(d).filter(k=>k.startsWith(prefix)).sort();
  const content = document.getElementById('monthContent');
  if(monthKeys.length === 0) {
    content.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div>이 달 기록이 없어요</div>';
    return;
  }
  const monthTotal = monthKeys.reduce((s,k)=>s+(d[k].totalUSD||0)*( d[k].rate||DEFAULT_RATE),0);
  const monthCount = monthKeys.reduce((s,k)=>s+(d[k].transactions||[]).length,0);
  const avgDaily = monthTotal / monthKeys.length;
  const bestDay = monthKeys.reduce((best,k)=>{
    const v = (d[k].totalUSD||0)*(d[k].rate||DEFAULT_RATE);
    return (!best || v > (d[best].totalUSD||0)*(d[best].rate||DEFAULT_RATE)) ? k : best;
  }, null);
  const maxVal = Math.max(...monthKeys.map(k=>(d[k].totalUSD||0)*(d[k].rate||DEFAULT_RATE)));
  content.innerHTML = `
    <div class="month-summary">
      <div class="ms-label">${label} 총 매출</div>
      <div class="ms-amount">${fmtKRW(monthTotal)}</div>
      <div class="ms-stats">
        <div><div class="ms-stat-label">영업일</div><div class="ms-stat-val">${monthKeys.length}일</div></div>
        <div><div class="ms-stat-label">총 건수</div><div class="ms-stat-val">${monthCount}건</div></div>
        <div><div class="ms-stat-label">일 평균</div><div class="ms-stat-val">${fmtKRW(avgDaily)}</div></div>
      </div>
    </div>
    <div class="report-card">
      <div class="input-card-title">일별 매출</div>
      <div class="day-chart">
        ${monthKeys.map(k=>{
          const val = (d[k].totalUSD||0)*(d[k].rate||DEFAULT_RATE);
          const pct = maxVal > 0 ? Math.max((val/maxVal)*100, 3) : 3;
          const day = k.split('-')[2];
          return `<div class="day-row">
            <div class="day-label">${day}일</div>
            <div class="day-bar-wrap">
              <div class="day-bar" style="width:${pct}%">
                <span class="day-bar-val">${fmtKRW(val)}</span>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
      ${bestDay ? `<div style="font-size:12px;color:var(--gray);text-align:center;margin-top:8px">🏆 최고 매출일: ${bestDay.split('-')[2]}일 ${fmtKRW((d[bestDay].totalUSD||0)*(d[bestDay].rate||DEFAULT_RATE))}</div>` : ''}
    </div>`;
}

// ── 탭 전환 ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='daily') renderDaily();
  if(tab==='monthly') renderMonthly();
}

// ── 토스트 ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ── 전체 렌더 ──
function renderAll() {
  renderToday();
  // 현재 보이는 탭이 daily/monthly면 해당도 렌더
  if(document.getElementById('tab-daily').classList.contains('active')) renderDaily();
  if(document.getElementById('tab-monthly').classList.contains('active')) renderMonthly();
}

// ── 초기화 ──
renderToday();

// ① 1분마다 자정 체크 (날짜 변경 감지 → 자동 마감)
setInterval(midnightCheck, 60000);

// ② Page Visibility API: 앱이 백그라운드에서 돌아올 때도 체크
document.addEventListener('visibilitychange', function() {
  if(document.visibilityState === 'visible') {
    midnightCheck();
  }
});

// ③ focus 이벤트 (탭 전환 후 돌아올 때)
window.addEventListener('focus', midnightCheck);
</script>
</body>
</html>
